<div>
  <div class=" offcanvas-md offcanvas-end bg-body-" tabindex="-1" id="sidebarMenu"
    aria-labelledby="sidebarMenuLabel">
    <div class="offcanvas-header">
      <div class="d-flex flex-column w-100">
        <h5 class="offcanvas-title" id="sidebarMenuLabel">Gestor tareas</h5>
        <!-- Mostrar usuario actual -->
        <small class="text-muted mt-2" *ngIf="usuarioActual()">
          <i class="bi bi-person-fill"></i> {{ usuarioActual()?.nombre }}
        </small>
      </div>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"
        aria-label="Close"></button>
    </div>

    <div class="offcanvas-body d-md-flex flex-column p-0 pt-lg-3 overflow-y-auto">
      <nav class="h-100 d-flex flex-column">
        <ul class="nav  flex-column">
          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }">
              <i class="bi bi-house"></i>
              Dashboard
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }">
              <i class="bi bi-list-task"></i>
              Todas las tareas
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active">
              <i class="bi bi-plus-square"></i>
              Nueva tarea
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active">
              <i class="bi bi-check2-square"></i>
              Completadas
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active">
              <i class="bi bi-hourglass-split"></i>
              Pendientes
            </a>
          </li>
        </ul>

        <h6
          class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-body-secondary text-uppercase">
          <span>Organización</span>
          <a class="link-secondary" routerLink="/tareas" aria-label="Ver categorías">
            <i class="bi bi-folder-plus"></i>
          </a>
        </h6>

        <ul class="nav flex-column mb-auto">
          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active">
              <i class="bi bi-folder"></i>
              Categorías
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active">
              <i class="bi bi-flag"></i>
              Prioridades
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active">
              <i class="bi bi-calendar-event"></i>
              Hoy
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active">
              <i class="bi bi-calendar3"></i>
              Próximas
            </a>
          </li>
        </ul>

        <hr class="my-3" />

        <ul class="nav flex-column mb-auto">
          <li class="nav-item">
            <a class="nav-link d-flex" routerLink="/tareas" routerLinkActive="active">
              <i class="bi bi-gear"></i>
              Configuracion
            </a>
          </li>

          <li class="nav-item">
            <button
              type="button"
              class="nav-link d-flex w-100 border-0"
              (click)="irAEditarPerfil()"
            >
              <i class="bi bi-person-circle"></i>
              Editar Perfil
            </button>
          </li>

          <li class="nav-item">
            <button
              type="button"
              class="nav-link d-flex w-100 border-0 text-danger"
              (click)="logout()"
            >
              <i class="bi bi-box-arrow-right"></i>
              Logout
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>
