<!-- Property binding pasa valores a las propiedades del componente -->
<!-- Event binding reacciona a eventos del componente -->
<th scope="row">1</th>
<td>{{tarea.titulo}}</td>
<td>{{tarea.descripcion}}</td>
<td>{{tarea.fechaCreacion}}</td>
<td>{{tarea.fechaLimite}}</td>
@switch (tarea.tipo ?? tarea.tipoTarea){
@case('Simple'){
<td class="tipo text-success">{{tarea.tipo ?? tarea.tipoTarea}}</td>
}
@case('Recurrente'){
<td class="tipo text-warning">{{tarea.tipo ?? tarea.tipoTarea}}</td>
}
@case('Prioritaria'){
<td class="tipo text-danger">{{tarea.tipo ?? tarea.tipoTarea}}</td>
}
}
<td>
    <button class="btn btn-success"  (click)="onVerDetalles()">
        <p class="m-0 text-white">Ver</p>
        <!-- <i class="bi bi-eye-fill" style="color: white;"> -->
        <!-- </i> -->
    </button>
</td>
